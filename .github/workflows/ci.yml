name: CI

on:
  push:
  pull_request:

jobs:
  basic-checks:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check setup script syntax
        run: |
          bash -n scripts/setup_jira_token.sh
          bash -n scripts/sync_installed_skill.sh

      - name: Compile Python scripts
        run: python3 -m py_compile scripts/*.py

      - name: Check public sample references
        run: |
          if grep -R "team-config[.]private[.]sample[.]json" . \
            --exclude-dir=.git \
            --exclude-dir=.local-archive; then
            echo "Do not reference ignored private sample files in public docs or scripts."
            exit 1
          fi
